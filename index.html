<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>WebOS — 浏览器操作系统</title>
<style>
/* ============ RESET & BASE ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;background:#0f172a;color:var(--fg);-webkit-font-smoothing:antialiased;user-select:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,textarea{font:inherit}
img{max-width:100%;display:block}
:root{
  --fg:#1e293b;--bg:#f1f5f9;--card:#ffffff;--muted:#94a3b8;--border:#e2e8f0;
  --accent:#6366f1;--accent-fg:#fff;--primary:#6366f1;--danger:#ef4444;
  --menubar-bg:rgba(0,0,0,.25);--dock-bg:rgba(255,255,255,.22);--win-shadow:0 20px 60px rgba(0,0,0,.3);
  --radius:12px;
}
.dark{
  --fg:#e2e8f0;--bg:#0f172a;--card:#1e293b;--muted:#64748b;--border:#334155;
  --menubar-bg:rgba(0,0,0,.4);--dock-bg:rgba(255,255,255,.12);--win-shadow:0 24px 70px rgba(0,0,0,.55);
}
#root{position:fixed;inset:0;overflow:hidden}
.hidden{display:none!important}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{scrollbar-width:none}
.thin-scroll::-webkit-scrollbar{width:8px;height:8px}
.thin-scroll::-webkit-scrollbar-thumb{background:rgba(128,128,128,.4);border-radius:4px}
.thin-scroll::-webkit-scrollbar-track{background:transparent}
.tabular{font-variant-numeric:tabular-nums}

/* ============ BOOT ============ */
#boot{position:fixed;inset:0;z-index:9999;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
#boot .logo{font-size:64px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
#boot .bar{width:200px;height:3px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
#boot .bar i{display:block;height:100%;background:#fff;width:0;transition:width .1s}
#boot .label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}

/* ============ LOCK SCREEN ============ */
#lock{position:fixed;inset:0;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:space-between;color:#fff;background-size:cover;background-position:center}
#lock .blur{position:absolute;inset:0;backdrop-filter:blur(30px) brightness(.6);transition:opacity .6s}
#lock .clock-view,#lock .login-view{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
#lock .clock-view{padding-top:14vh}
#lock .big-time{font-size:min(22vw,120px);font-weight:600;line-height:1;letter-spacing:-2px;text-shadow:0 4px 30px rgba(0,0,0,.4)}
#lock .big-date{margin-top:8px;font-size:20px;font-weight:300;opacity:.95}
#lock .login-view{margin:auto;gap:16px}
#lock .avatar{width:108px;height:108px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(0,0,0,.3)}
#lock .avatar svg{width:56px;height:56px;stroke:rgba(255,255,255,.9)}
#lock .uname{font-size:22px;font-weight:500}
#lock .enter-pill{display:flex;align-items:center;gap:8px;padding:8px 8px 8px 20px;border-radius:99px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(10px);transition:.2s}
#lock .enter-pill:hover{background:rgba(255,255,255,.32)}
#lock .enter-pill .arrow{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center}
#lock .pwr-row{display:flex;gap:12px;margin-top:16px}
#lock .pwr-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;transition:.2s}
#lock .pwr-btn:hover{background:rgba(255,255,255,.28)}
#lock .hint{position:relative;z-index:2;padding-bottom:8vh;font-size:13px;opacity:.7;animation:fade 2.5s ease-in-out infinite}
@keyframes fade{0%,100%{opacity:.4}50%{opacity:.85}}
#lock .top-clock{position:absolute;top:12px;right:16px;font-size:12px;opacity:.8;z-index:3}

/* ============ MENU BAR ============ */
#menubar{position:fixed;top:0;left:0;right:0;height:28px;z-index:9000;display:flex;align-items:center;padding:0 8px;gap:2px;color:#fff;background:var(--menubar-bg);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);font-size:13px}
#menubar .mb-item{height:100%;padding:0 8px;display:flex;align-items:center;border-radius:5px;transition:background .15s}
#menubar .mb-item:hover{background:rgba(255,255,255,.18)}
#menubar .mb-item.active{background:rgba(255,255,255,.25)}
#menubar .mb-logo svg{width:14px;height:14px;fill:currentColor;opacity:.95}
#menubar .mb-app{font-weight:600}
#menubar .mb-spacer{flex:1}
#menubar .mb-right{display:flex;align-items:center;gap:1px}
#menubar .mb-right .mb-item{padding:0 6px}
#menubar .mb-right svg{width:15px;height:15px}
#menubar .mb-clock{padding:0 8px;display:flex;gap:8px}
.dropdown{position:absolute;top:30px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.25);padding:6px;min-width:200px;z-index:9100;animation:drop .14s ease}
@keyframes drop{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
.dropdown .item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:13px;color:var(--fg)}
.dropdown .item:hover{background:var(--primary);color:#fff}
.dropdown .item .sc{margin-left:auto;font-size:11px;opacity:.6}
.dropdown .sep{height:1px;background:var(--border);margin:4px 8px}
.dropdown .item svg{width:14px;height:14px}

/* ============ DESKTOP ============ */
#desktop{position:absolute;inset:0;background-size:cover;background-position:center;overflow:hidden}
#desk-icons{position:absolute;top:40px;left:8px;display:grid;grid-auto-flow:column;grid-template-rows:repeat(auto-fill,92px);gap:2px;max-height:calc(100% - 150px)}
.desk-icon{display:flex;flex-direction:column;align-items:center;gap:4px;width:80px;padding:8px;border-radius:8px;transition:background .15s}
.desk-icon:hover{background:rgba(255,255,255,.12)}
.desk-icon.sel{background:rgba(255,255,255,.22)}
.desk-icon .ic{width:48px;height:48px;border-radius:25%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);font-size:24px}
.desk-icon .nm{font-size:12px;color:#fff;text-align:center;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.6);max-width:100%;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
#desk-clock{position:absolute;top:40px;right:24px;color:#fff;text-align:right;text-shadow:0 2px 8px rgba(0,0,0,.4);pointer-events:none}
#desk-clock .t{font-size:42px;font-weight:200;line-height:1}
#desk-clock .d{font-size:13px;opacity:.9;margin-top:4px}

/* ============ DOCK ============ */
#dock{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;z-index:9000;pointer-events:none}
#dock .dock-inner{display:flex;align-items:flex-end;gap:6px;padding:6px 10px;border-radius:20px;background:var(--dock-bg);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.25);box-shadow:0 12px 40px rgba(0,0,0,.25);pointer-events:auto;animation:dockIn .4s cubic-bezier(.2,.9,.3,1.2)}
@keyframes dockIn{from{transform:translateY(80px);opacity:0}to{transform:none;opacity:1}}
.dock-item{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex-shrink:0}
.dock-item .di-btn{width:var(--ds,52px);height:var(--ds,52px);border-radius:22%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 10px rgba(0,0,0,.25);transition:transform .05s;cursor:pointer;background:linear-gradient(135deg,var(--g1,#6366f1),var(--g2,#8b5cf6))}
.dock-item .di-btn svg{width:50%;height:50%;stroke:#fff}
.dock-item .di-btn .letter{font-size:calc(var(--ds,52px)*.42);font-weight:600;color:#fff}
.dock-item .tip{position:absolute;bottom:calc(100% + 6px);background:var(--card);color:var(--fg);border:1px solid var(--border);padding:4px 10px;border-radius:6px;font-size:12px;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;pointer-events:none;transform:translateY(4px);transition:.15s}
.dock-item:hover .tip{opacity:1;transform:none}
.dock-item .dot{position:absolute;bottom:-4px;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.8)}
.dock-sep{width:1px;height:40px;background:rgba(255,255,255,.2);align-self:center;margin:0 4px}
.dock-item .badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;padding:0 4px;border-radius:99px;background:var(--danger);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3)}

/* ============ WINDOWS ============ */
#windows{position:absolute;inset:0;pointer-events:none}
.win{position:absolute;display:flex;flex-direction:column;background:var(--card);border-radius:var(--radius);box-shadow:var(--win-shadow);border:1px solid var(--border);overflow:hidden;pointer-events:auto;animation:winOpen .18s cubic-bezier(.2,.8,.2,1)}
@keyframes winOpen{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.win.maximized{border-radius:0}
.win.minimized{opacity:0;transform:scale(.85) translateY(240px);pointer-events:none;transition:.25s}
.win .titlebar{display:flex;align-items:center;gap:8px;height:32px;padding:0 10px;background:var(--muted);background:color-mix(in srgb,var(--muted) 20%,var(--card));border-bottom:1px solid var(--border);flex-shrink:0;cursor:grab}
.win .titlebar.dragging{cursor:grabbing}
.win .titlebar.inactive{opacity:.7}
.win .traffic{display:flex;gap:7px;align-items:center}
.win .traffic button{width:13px;height:13px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center}
.win .traffic .close{background:#ff5f57}.win .traffic .min{background:#febc2e}.win .traffic .max{background:#28c840}
.win .traffic button svg{width:8px;height:8px;opacity:0;stroke:rgba(0,0,0,.5)}
.win .traffic button:hover svg{opacity:1}
.win .title{flex:1;display:flex;align-items:center;gap:6px;min-width:0;font-size:12px;font-weight:500}
.win .title .tic{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--g1,#6366f1),var(--g2,#8b5cf6))}
.win .title .tic svg{width:10px;height:10px}
.win .title .tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win .body{flex:1;min-height:0;overflow:hidden;background:var(--bg);position:relative}
.win .resize{position:absolute;z-index:5}
.win .resize.n{top:0;left:6px;right:6px;height:4px;cursor:ns-resize}
.win .resize.s{bottom:0;left:6px;right:6px;height:4px;cursor:ns-resize}
.win .resize.e{right:0;top:6px;bottom:6px;width:4px;cursor:ew-resize}
.win .resize.w{left:0;top:6px;bottom:6px;width:4px;cursor:ew-resize}
.win .resize.ne{top:0;right:0;width:10px;height:10px;cursor:nesw-resize}
.win .resize.nw{top:0;left:0;width:10px;height:10px;cursor:nwse-resize}
.win .resize.se{bottom:0;right:0;width:10px;height:10px;cursor:nwse-resize}
.win .resize.sw{bottom:0;left:0;width:10px;height:10px;cursor:nesw-resize}

/* ============ CONTEXT MENU ============ */
#ctxmenu{position:fixed;z-index:9500;min-width:180px;padding:5px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.3);animation:drop .12s ease}
#ctxmenu .item{display:flex;align-items:center;gap:10px;padding:6px 12px;border-radius:6px;font-size:13px;color:var(--fg)}
#ctxmenu .item:hover{background:var(--primary);color:#fff}
#ctxmenu .sep{height:1px;background:var(--border);margin:4px 8px}

/* ============ COMMAND PALETTE ============ */
#palette-overlay{position:fixed;inset:0;z-index:9600;background:rgba(0,0,0,.35);backdrop-filter:blur(2px);display:flex;justify-content:center;padding-top:12vh}
#palette{width:min(560px,calc(100vw - 32px));background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:0 24px 70px rgba(0,0,0,.4);overflow:hidden;align-self:flex-start;animation:drop .16s ease;height:fit-content;max-height:65vh;display:flex;flex-direction:column}
#palette .search{display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;border-bottom:1px solid var(--border)}
#palette .search input{flex:1;background:none;border:none;outline:none;font-size:16px;color:var(--fg)}
#palette .list{overflow-y:auto;padding:8px}
#palette .grp{font-size:10px;font-weight:600;text-transform:uppercase;opacity:.5;padding:6px 8px 4px}
#palette .pitem{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:8px;cursor:pointer}
#palette .pitem.active{background:var(--primary);color:#fff}
#palette .pitem .pic{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;background:linear-gradient(135deg,var(--g1,#6366f1),var(--g2,#8b5cf6))}
#palette .pitem .pic svg{width:14px;height:14px}
#palette .pitem .pl{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#palette .pitem .ph{font-size:11px;opacity:.6}

/* ============ GENERIC UI ============ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:13px;background:var(--primary);color:#fff;transition:.15s}
.btn:hover{filter:brightness(1.1)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:var(--muted);color:var(--fg)}.btn.ghost:hover{background:var(--border)}
.btn.danger{background:var(--danger)}
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:.15s}
.icon-btn:hover{background:var(--muted)}
.icon-btn svg{width:16px;height:16px}
input[type=range]{width:100%;height:4px;border-radius:99px;background:var(--border);appearance:none;-webkit-appearance:none}
input[type=range]::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.field{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px}
.field label{flex:1;font-size:13px}

/* ============ APP: FILE MANAGER ============ */
.fm{display:flex;height:100%}
.fm .sidebar{width:160px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--muted) 15%,transparent);padding:8px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.fm .sidebar .si{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer}
.fm .sidebar .si.active{background:var(--primary);color:#fff}
.fm .sidebar .si:hover:not(.active){background:var(--muted)}
.fm .sidebar .si svg{width:16px;height:16px}
.fm .main{flex:1;display:flex;flex-direction:column;min-width:0}
.fm .toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);height:44px;flex-shrink:0}
.fm .crumb{flex:1;display:flex;align-items:center;gap:4px;font-size:13px;min-width:0;overflow:hidden;padding:0 8px}
.fm .crumb span{cursor:pointer;white-space:nowrap}.fm .crumb span:hover{text-decoration:underline}
.fm .content{flex:1;overflow-y:auto;padding:12px}
.fm .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:6px}
.fm .fitem{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border-radius:10px;cursor:default;text-align:center;position:relative}
.fm .fitem:hover{background:var(--muted)}
.fm .fitem.sel{background:color-mix(in srgb,var(--primary) 15%,transparent);outline:1px solid var(--primary)}
.fm .fitem .fico{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.fm .fitem .fico svg{width:28px;height:28px}
.fm .fitem .fico.folder{background:color-mix(in srgb,#f59e0b 15%,transparent)}.fm .fitem .fico.folder svg{stroke:#f59e0b}
.fm .fitem .fico.txt{background:color-mix(in srgb,#0ea5e9 15%,transparent)}.fm .fitem .fico.txt svg{stroke:#0ea5e9}
.fm .fitem .fico.img{background:color-mix(in srgb,#10b981 15%,transparent)}.fm .fitem .fico.img svg{stroke:#10b981}
.fm .fitem .fico.unk{background:var(--muted)}.fm .fitem .fico.unk svg{stroke:var(--muted)}
.fm .fitem .fnm{font-size:12px;word-break:break-all;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;width:100%}
.fm .fitem .acts{position:absolute;top:4px;right:4px;display:none;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2px}
.fm .fitem:hover .acts{display:flex}
.fm .fitem .acts button{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center}.fm .fitem .acts button:hover{background:var(--muted)}
.fm .fitem .acts svg{width:12px;height:12px}
.fm .statusbar{display:flex;justify-content:space-between;padding:4px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);height:26px;align-items:center}

/* ============ APP: BROWSER ============ */
.br{display:flex;flex-direction:column;height:100%;background:var(--bg)}
.br .tabs{display:flex;align-items:center;gap:4px;padding:6px 8px;height:36px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.br .tab{display:flex;align-items:center;gap:6px;padding:4px 8px 4px 10px;border-radius:8px;background:var(--muted);font-size:12px;max-width:180px;cursor:pointer}
.br .tab.active{background:var(--bg)}
.br .tab .tx{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.br .tab .x{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center}.br .tab .x:hover{background:var(--border)}
.br .tab .x svg{width:10px;height:10px}
.br .toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--card)}
.br .addr{flex:1;display:flex;align-items:center;gap:8px;height:30px;padding:0 12px;margin:0 4px;border-radius:99px;background:var(--muted);border:1px solid var(--border)}
.br .addr input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--fg);min-width:0}
.br .addr svg{width:14px;height:14px;stroke:var(--muted);flex-shrink:0}
.br .content{flex:1;position:relative;background:#fff}
.br .content iframe{width:100%;height:100%;border:0}
.br .newtab{display:flex;flex-direction:column;align-items:center;padding:40px 20px;background:linear-gradient(180deg,var(--bg),var(--card))}
.br .newtab .logo{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;color:#fff;margin-bottom:12px}
.br .newtab .logo svg{width:32px;height:32px}
.br .newtab h1{font-size:20px;font-weight:300;margin-bottom:20px;color:var(--fg)}
.br .newtab .search{width:min(480px,100%);display:flex;align-items:center;gap:10px;height:48px;padding:0 18px;border-radius:99px;background:var(--card);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.br .newtab .search input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--fg)}
.br .ql{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:28px;width:min(480px,100%)}
.br .ql button{display:flex;flex-direction:column;align-items:center;gap:6px}
.br .ql .qi{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px}
.br .ql .qn{font-size:12px;color:var(--fg)}

/* ============ APP: TEXT EDITOR ============ */
.te{display:flex;flex-direction:column;height:100%}
.te .toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);height:44px;background:var(--card)}
.te .toolbar .fn{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.te .editor{flex:1;display:flex;background:var(--bg)}
.te .gutter{padding:12px 8px;text-align:right;font-family:ui-monospace,monospace;font-size:13px;line-height:1.6;color:var(--muted);background:var(--card);border-right:1px solid var(--border);user-select:none;overflow:hidden;min-width:44px}
.te textarea{flex:1;padding:12px;border:none;outline:none;resize:none;background:none;font-family:ui-monospace,monospace;font-size:13px;line-height:1.6;color:var(--fg)}
.te .statusbar{display:flex;gap:16px;padding:4px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);height:26px;align-items:center}

/* ============ APP: TERMINAL ============ */
.term{height:100%;background:#0c0c0c;color:#e2e8f0;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13px;display:flex;flex-direction:column}
.term .out{flex:1;overflow-y:auto;padding:10px 12px;line-height:1.5}
.term .out .line{white-space:pre-wrap;word-break:break-word}
.term .out .prompt-line{display:flex;gap:6px}
.term .out .ps{color:#10b981;flex-shrink:0}
.term .input-line{display:flex;gap:6px;padding:6px 12px 10px;align-items:center}
.term .input-line .ps{color:#10b981;flex-shrink:0}
.term input{flex:1;background:none;border:none;outline:none;color:inherit;font:inherit}

/* ============ APP: CALCULATOR ============ */
.calc{display:flex;flex-direction:column;height:100%;background:var(--card);padding:12px}
.calc .display{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;padding:12px;min-height:80px}
.calc .expr{font-size:14px;color:var(--muted);min-height:20px;word-break:break-all;text-align:right}
.calc .result{font-size:42px;font-weight:300;color:var(--fg);word-break:break-all;text-align:right}
.calc .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.calc button{height:56px;border-radius:12px;font-size:20px;background:var(--muted);color:var(--fg);transition:.1s}
.calc button:hover{filter:brightness(1.1)}
.calc button:active{transform:scale(.95)}
.calc button.op{background:var(--primary);color:#fff}
.calc button.fn{background:var(--border)}
.calc button.eq{background:var(--accent);color:#fff}
.calc button.span2{grid-column:span 2;justify-content:flex-start;padding-left:24px}

/* ============ APP: SETTINGS ============ */
.set{display:flex;height:100%}
.set .nav{width:160px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--muted) 15%,transparent);padding:8px;display:flex;flex-direction:column;gap:2px}
.set .nav .ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer}
.set .nav .ni.active{background:var(--primary);color:#fff}
.set .nav .ni:hover:not(.active){background:var(--muted)}
.set .nav .ni svg{width:16px;height:16px}
.set .content{flex:1;overflow-y:auto;padding:20px}
.set .content h2{font-size:18px;margin-bottom:16px}
.set .section{margin-bottom:24px;max-width:560px}
.set .wp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.set .wp{position:relative;height:64px;border-radius:10px;overflow:hidden;border:2px solid transparent;cursor:pointer;background-size:cover;background-position:center}
.set .wp.active{border-color:var(--primary)}
.set .wp .wn{position:absolute;bottom:4px;left:8px;font-size:11px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.set .accent-row{display:flex;gap:8px;flex-wrap:wrap}
.set .accent-row button{width:32px;height:32px;border-radius:50%;border:2px solid transparent}
.set .accent-row button.active{border-color:var(--fg)}
.set .theme-row{display:flex;gap:12px}
.set .theme-card{flex:1;display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--border);border-radius:12px;cursor:pointer}
.set .theme-card.active{border-color:var(--primary)}

/* ============ APP: APP STORE ============ */
.as{display:flex;height:100%}
.as .nav{width:160px;border-right:1px solid var(--border);background:color-mix(in srgb,var(--muted) 15%,transparent);padding:8px;display:flex;flex-direction:column;gap:2px}
.as .nav .ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;font-size:13px;cursor:pointer}
.as .nav .ni.active{background:var(--primary);color:#fff}
.as .nav .ni:hover:not(.active){background:var(--muted)}
.as .main{flex:1;display:flex;flex-direction:column;min-width:0}
.as .searchbar{padding:10px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.as .searchbar .si{flex:1;display:flex;align-items:center;gap:8px;height:36px;padding:0 12px;border-radius:8px;background:var(--muted)}
.as .searchbar input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--fg)}
.as .cards{flex:1;overflow-y:auto;padding:16px}
.as .custom{padding:14px;border:2px dashed var(--border);border-radius:12px;margin-bottom:16px}
.as .custom .row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:10px}
.as .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.as .card{display:flex;flex-direction:column;gap:10px;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--card)}
.as .card .top{display:flex;align-items:center;gap:10px}
.as .card .ai{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:600;flex-shrink:0}
.as .card .meta{flex:1;min-width:0}
.as .card .meta .nm{font-weight:600;font-size:14px}
.as .card .meta .ds{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ============ APP: CLOCK ============ */
.clock-app{padding:16px;height:100%;overflow-y:auto}
.clock-app .analog{display:flex;justify-content:center;margin:20px 0}
.clock-app .digital{text-align:center;font-size:32px;font-weight:200}
.tabs{display:flex;gap:2px;padding:8px;border-bottom:1px solid var(--border)}
.tabs .tab{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}
.tabs .tab.active{background:var(--primary);color:#fff}

/* ============ APP: ABOUT ============ */
.about{padding:24px;height:100%;overflow-y:auto;text-align:center}
.about .logo{font-size:56px;margin-bottom:8px}
.about h1{font-size:24px;font-weight:300}
.about .ver{font-size:13px;color:var(--muted);margin-bottom:24px}
.about .info{text-align:left;max-width:440px;margin:0 auto}
.about .info .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.about .info .row .k{color:var(--muted)}

/* ============ SNAP OVERLAY ============ */
#snap-overlay{position:fixed;z-index:8500;border-radius:12px;border:2px solid rgba(255,255,255,.6);background:rgba(255,255,255,.12);pointer-events:none;transition:.1s}

/* ============ MOBILE ============ */
#mobile{position:absolute;inset:0;display:flex;flex-direction:column;color:#fff;overflow:hidden;background-size:cover;background-position:center}
#mobile .statusbar{display:flex;justify-content:space-between;align-items:center;padding:0 20px;height:28px;font-size:12px;font-weight:600;flex-shrink:0}
#mobile .home{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:20px}
#mobile .mclock{text-align:center;padding:20px 0 30px}
#mobile .mclock .t{font-size:56px;font-weight:200;line-height:1}
#mobile .mclock .d{font-size:14px;opacity:.9;margin-top:6px}
#mobile .msearch{margin:0 16px 16px;display:flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:99px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px)}
#mobile .msearch input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px}
#mobile .msearch input::placeholder{color:rgba(255,255,255,.7)}
#mobile .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px 12px;padding:0 12px}
#mobile .micon{display:flex;flex-direction:column;align-items:center;gap:6px}
#mobile .micon .ic{width:56px;height:56px;border-radius:22%;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.25)}
#mobile .micon .ic svg{width:28px;height:28px}
#mobile .micon .nm{font-size:11px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
#mobile .mdock{margin:0 16px 12px;display:flex;justify-content:center;gap:14px;padding:12px;border-radius:28px;background:rgba(255,255,255,.2);backdrop-filter:blur(20px)}
#mobile .mdock .micon .ic{width:48px;height:48px}
#mobile .mhome-bar{display:flex;justify-content:center;padding:6px 0 8px}
#mobile .mhome-bar button{width:128px;height:5px;border-radius:99px;background:rgba(255,255,255,.6)}
#mobile .mapp{flex:1;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
#mobile .mapp .topbar{display:flex;align-items:center;gap:8px;height:44px;padding:0 8px;background:var(--card);border-bottom:1px solid var(--border)}
#mobile .mapp .topbar .title{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#mobile .mapp .content{flex:1;overflow:hidden;position:relative}

/* SVG icon defaults */
svg{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>

const STORE_KEY='webos-standalone';
function save(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify({
      apps:state.apps,settings:state.settings,files:state.files,trash:state.trash,
      notifications:state.notifications,bookmarks:state.bookmarks,history:state.history,
    }));
  }catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');
    if(d.apps){const userApps=(d.apps||[]).filter(a=>!a.builtin);state.apps=[...DEFAULT_APPS.map(a=>({...a})),...userApps];}
    if(d.settings)Object.assign(state.settings,d.settings);
    if(d.files)state.files=d.files;
    if(d.trash)state.trash=d.trash;
    if(d.notifications)state.notifications=d.notifications;
    if(d.bookmarks)state.bookmarks=d.bookmarks;
    if(d.history)state.history=d.history;
  }catch(e){}
}

/* ---------- App icon helper ---------- */
function appIconSVG(app,size){
  const wrap=el('div',{class:'ic-wrap',style:`width:${size}px;height:${size}px;border-radius:22%;display:flex;align-items:center;justify-content:center;color:#fff;background:linear-gradient(135deg,${app.g1||'#6366f1'},${app.g2||'#8b5cf6'});box-shadow:0 4px 10px rgba(0,0,0,.2)`});
  if(app.url){wrap.textContent=(app.name[0]||'A').toUpperCase();wrap.style.fontSize=(size*0.42)+'px';wrap.style.fontWeight='600';}
  else{const ic=icon(app.icon);ic.style.width=(size*0.5)+'px';ic.style.height=(size*0.5)+'px';wrap.appendChild(ic);}
  return wrap;
}

/* ---------- Lifecycle: boot/lock/desktop ---------- */
function boot(){
  load();
  showBoot();
  setTimeout(()=>{
    const bar=$('#boot-bar');let p=0;
    const t=setInterval(()=>{
      p+=5;if(p>=100){p=100;clearInterval(t);setTimeout(()=>{hideBoot();state.phase='lock';renderAll();},250);}
      if(bar)bar.style.width=p+'%';
    },60);
  },200);
}
function showBoot(){$('#boot').classList.remove('hidden');}
function hideBoot(){$('#boot').classList.add('hidden');}
function lock(){state.phase='lock';renderAll();}
function unlock(){state.phase='desktop';renderAll();}
function shutdown(){state.phase='boot';state.windows=[];showBoot();setTimeout(()=>{state.phase='lock';hideBoot();renderAll();},2000);}
function restart(){state.windows=[];showBoot();setTimeout(()=>{state.phase='lock';hideBoot();renderAll();},2200);}

/* ---------- Root render ---------- */
function renderAll(){
  const root=$('#root');
  root.innerHTML='';
  // theme
  document.documentElement.classList.toggle('dark',state.settings.theme==='dark');
  document.documentElement.style.setProperty('--accent',state.settings.accent);
  document.documentElement.style.setProperty('--primary',state.settings.accent);
  if(state.phase==='lock'){root.appendChild(renderLock());return;}
  if(state.phase==='desktop'){
    try{
      if(window.matchMedia('(max-width:767px)').matches){
        root.appendChild(renderMobile());
      }else{
        root.appendChild(renderDesktopShell());
      }
    }catch(err){
      console.error('renderDesktopShell error:',err);
      root.appendChild(el('div',{style:'padding:40px;color:#fff;background:#000;height:100vh'},'渲染错误: '+err.message+' @ '+(err.stack||'').split('\n')[1]));
    }
    return;
  }
}

/* ---------- Dock ---------- */
function renderDock(){
  const wrap=el('div',{id:'dock'});
  const inner=el('div',{class:'dock-inner'});
  const pinnedIds=['filemanager','browser','appstore','settings','texteditor','terminal','calculator','clock','about'];
  const dockApps=pinnedIds.map(id=>state.apps.find(a=>a.id===id)).filter(Boolean);
  // running extras
  state.apps.filter(a=>!pinnedIds.includes(a.id)&&state.windows.some(w=>w.appId===a.id)).forEach(a=>dockApps.push(a));
  dockApps.forEach(app=>{
    const item=makeDockItem(app);
    inner.appendChild(item);
  });
  // separator + trash
  inner.appendChild(el('div',{class:'dock-sep'}));
  const trash=el('div',{class:'dock-item'});
  const tb=el('div',{class:'di-btn',style:'--g1:#64748b;--g2:#334155'},[icon('trash')]);
  if(state.trash.length)tb.appendChild(el('div',{class:'badge'},String(state.trash.length)));
  trash.appendChild(tb);
  trash.appendChild(el('div',{class:'tip'},'回收站'));
  tb.onclick=()=>openApp('filemanager',{view:'trash'});
  inner.appendChild(trash);
  // magnification
  inner.addEventListener('mousemove',e=>{
    inner.querySelectorAll('.dock-item').forEach(item=>{
      const btn=item.querySelector('.di-btn');
      if(!btn)return;
      const r=item.getBoundingClientRect();
      const cx=r.left+r.width/2;
      const dist=Math.abs(e.clientX-cx);
      const max=28;const range=130;
      const mag=dist<range?(1-(dist/range))*max:0;
      btn.style.setProperty('--ds',(52+mag)+'px');
      btn.style.transform=`translateY(-${mag*0.3}px)`;
    });
  });
  inner.addEventListener('mouseleave',()=>{
    inner.querySelectorAll('.di-btn').forEach(b=>{b.style.setProperty('--ds','52px');b.style.transform='';});
  });
  wrap.appendChild(inner);
  return wrap;
}
function makeDockItem(app){
  const item=el('div',{class:'dock-item'});
  const btn=el('div',{class:'di-btn',style:`--g1:${app.g1};--g2:${app.g2}`});
  if(app.url){btn.textContent=(app.name[0]||'A').toUpperCase();btn.style.fontSize='22px';btn.style.fontWeight='600';}
  else btn.appendChild(icon(app.icon));
  btn.style.setProperty('--ds','52px');
  const running=state.windows.some(w=>w.appId===app.id);
  const active=state.windows.some(w=>w.appId===app.id&&w.id===state.activeWin&&!w.minimized);
  if(running){const dot=el('div',{class:'dot'});if(active)dot.style.background='#fff';item.appendChild(dot);}
  btn.oncontextmenu=e=>{e.preventDefault();e.stopPropagation();const ws=state.windows.filter(w=>w.appId===app.id);const items=[{label:`打开 ${app.name}`,fn:()=>openApp(app.id)}];if(ws.length){items.push({sep:true});ws.forEach(w=>items.push({label:w.title+(w.minimized?' (最小化)':w.id===state.activeWin?' (活动)':''),fn:()=>focusWindow(w.id)}));if(ws.length>1){items.push({sep:true});items.push({label:'关闭所有窗口',fn:()=>ws.forEach(w=>closeWindow(w.id))});}}showCtxMenu(e.clientX,e.clientY,items);};
  btn.onclick=()=>handleAppClick(app.id);
  item.appendChild(btn);
  item.appendChild(el('div',{class:'tip'},app.name));
  return item;
}
function handleAppClick(appId){
  const ws=state.windows.filter(w=>w.appId===appId);
  if(!ws.length){openApp(appId);return;}
  const active=ws.find(w=>w.id===state.activeWin&&!w.minimized);
  if(active)minimizeWindow(active.id);
  else focusWindow(ws.sort((a,b)=>b.z-a.z)[0].id);
}

/* ---------- Window management ---------- */
function openApp(appId,initState={}){
  const app=state.apps.find(a=>a.id===appId);
  if(!app)return;
  const singletons=['settings','appstore','about','calculator','clock'];
  if(singletons.includes(appId)){
    const ex=state.windows.find(w=>w.appId===appId);
    if(ex){focusWindow(ex.id);if(ex.minimized)ex.minimized=false;rerender();return;}
  }
  const id=uid('win');
  const z=state.zTop+1;
  const vw=window.innerWidth,vh=window.innerHeight;
  const dw=app.w||640,dh=app.h||480;
  const off=(state.windows.length%6)*28;
  const x=Math.max(12,Math.min(vw-dw-12,Math.round((vw-dw)/2)+off-80));
  const y=Math.max(36,Math.min(vh-dh-110,Math.round((vh-dh)/2)+off-40));
  state.windows.push({id,appId,title:app.name,x,y,width:dw,height:dh,minimized:false,maximized:false,z,state:initState});
  state.activeWin=id;state.zTop=z;
  save();
  rerender();
}
function closeWindow(id){state.windows=state.windows.filter(w=>w.id!==id);if(state.activeWin===id){const vis=state.windows.filter(w=>!w.minimized).sort((a,b)=>b.z-a.z)[0];state.activeWin=vis?vis.id:null;}save();rerender();}
function focusWindow(id){const z=state.zTop+1;state.zTop=z;state.activeWin=id;const w=state.windows.find(w=>w.id===id);if(w){w.z=z;w.minimized=false;}save();rerender();}
function minimizeWindow(id){const w=state.windows.find(w=>w.id===id);if(w)w.minimized=!w.minimized;if(state.activeWin===id){const vis=state.windows.filter(w=>!w.minimized&&w.id!==id).sort((a,b)=>b.z-a.z)[0];state.activeWin=vis?vis.id:null;}save();rerender();}
function toggleMaximize(id){const w=state.windows.find(w=>w.id===id);if(!w)return;if(w.maximized){w.maximized=false;}else{w.maximized=true;}save();rerender();}
function moveWindow(id,x,y){const w=state.windows.find(w=>w.id===id);if(w){w.x=x;w.y=y;save();}}
function resizeWindow(id,r){const w=state.windows.find(w=>w.id===id);if(w){w.x=r.x;w.y=r.y;w.width=r.width;w.height=r.height;save();}}
function snapWindow(id,side){
  const vw=window.innerWidth,vh=window.innerHeight;const top=28,bottom=90;
  const w=state.windows.find(w=>w.id===id);if(!w)return;
  if(side==='max'){w.maximized=true;}
  else if(side==='left'){w.maximized=false;w.x=0;w.y=top;w.width=Math.round(vw/2);w.height=vh-top-bottom;}
  else{w.maximized=false;w.x=Math.round(vw/2);w.y=top;w.width=Math.round(vw/2);w.height=vh-top-bottom;}
  save();rerender();
}

function renderWindow(win,app){
  const w=el('div',{class:'win'+(win.maximized?' maximized':'')+(win.minimized?' minimized':''),style:`z-index:${win.z}`,dataset:{id:win.id}});
  if(win.maximized){w.style.left='0';w.style.top='28px';w.style.width='100vw';w.style.height='calc(100vh - 118px)';}
  else{w.style.left=win.x+'px';w.style.top=win.y+'px';w.style.width=win.width+'px';w.style.height=win.height+'px';}
  // title bar
  const tb=el('div',{class:'titlebar'+(state.activeWin!==win.id?' inactive':'')});
  const traffic=el('div',{class:'traffic'});
  const closeB=el('button',{class:'close'},[icon('x')]);closeB.onclick=e=>{e.stopPropagation();closeWindow(win.id);};
  const minB=el('button',{class:'min'},[icon('minus')]);minB.onclick=e=>{e.stopPropagation();minimizeWindow(win.id);};
  const maxB=el('button',{class:'max'},[icon(win.maximized?'maximize':'maximize')]);maxB.onclick=e=>{e.stopPropagation();toggleMaximize(win.id);};
  traffic.appendChild(closeB);traffic.appendChild(minB);traffic.appendChild(maxB);
  tb.appendChild(traffic);
  const title=el('div',{class:'title'});
  const tic=el('div',{class:'tic',style:`--g1:${app.g1};--g2:${app.g2}`});
  if(app.url){tic.textContent=(app.name[0]||'A').toUpperCase();tic.style.fontSize='10px';tic.style.fontWeight='600';}
  else{const ic=icon(app.icon);ic.style.width='10px';ic.style.height='10px';tic.appendChild(ic);}
  title.appendChild(tic);title.appendChild(el('span',{class:'tn'},win.title));
  tb.appendChild(title);
  tb.appendChild(el('div',{style:'width:48px'}));
  w.appendChild(tb);
  // body
  const body=el('div',{class:'body'});
  body.appendChild(renderAppBody(win,app));
  w.appendChild(body);
  // resize handles
  if(!win.maximized){
    ['n','s','e','w','ne','nw','se','sw'].forEach(dir=>{
      const h=el('div',{class:'resize '+dir,dataset:{dir}});
      h.addEventListener('pointerdown',e=>startResize(e,win,dir));
      w.appendChild(h);
    });
  }
  // drag
  tb.addEventListener('pointerdown',e=>{
    if(e.target.closest('.traffic'))return;
    if(win.maximized)return;
    // Update focus inline without rerender — renderAll() would destroy this
    // titlebar DOM, breaking setPointerCapture and the move/up handlers.
    if(state.activeWin !== win.id){
      const oldEl = document.querySelector(`.win[data-id="${state.activeWin}"]`);
      if(oldEl){const ot=oldEl.querySelector('.titlebar');if(ot)ot.classList.add('inactive');}
      state.activeWin = win.id;
      win.z = state.zTop + 1; state.zTop = win.z;
      win.minimized = false;
      w.style.zIndex = win.z;
      w.classList.remove('minimized');
      tb.classList.remove('inactive');
      save();
    }
    const startX=e.clientX,startY=e.clientY,ox=win.x,oy=win.y;
    tb.classList.add('dragging');
    let snapTimer=null;
    // Capture the pointer on the title bar so drag keeps working even when the
    // cursor passes over iframes (which otherwise swallow pointer events).
    // This is essential for file:// usage where iframes have unique origins.
    try{tb.setPointerCapture(e.pointerId);}catch(err){}
    const move=ev=>{
      const dx=ev.clientX-startX,dy=ev.clientY-startY;
      let nx=ox+dx,ny=oy+dy;
      const vw=window.innerWidth,vh=window.innerHeight;
      nx=Math.max(-win.width+80,Math.min(vw-80,nx));
      ny=Math.max(28,Math.min(vh-60,ny));
      win.x=nx;win.y=ny;w.style.left=nx+'px';w.style.top=ny+'px';
      moveWindow(win.id,nx,ny);
      // snap preview
      const sp=ev.clientY<=4?'max':ev.clientX<=4?'left':ev.clientX>=vw-4?'right':null;
      showSnapPreview(sp);
      if(sp==='max'&&!snapTimer){snapTimer=setTimeout(()=>{snapWindow(win.id,'max');},350);}
      else if(sp!=='max'&&snapTimer){clearTimeout(snapTimer);snapTimer=null;}
    };
    const up=ev=>{
      tb.classList.remove('dragging');
      try{tb.releasePointerCapture(e.pointerId);}catch(err){}
      const sp=state.snapPreview;
      if(sp==='left')snapWindow(win.id,'left');
      else if(sp==='right')snapWindow(win.id,'right');
      showSnapPreview(null);
      if(snapTimer)clearTimeout(snapTimer);
      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
    };
    document.addEventListener('pointermove',move);
    document.addEventListener('pointerup',up);
  });
  tb.ondblclick=()=>toggleMaximize(win.id);
  w.addEventListener('pointerdown',()=>{if(state.activeWin!==win.id)focusWindow(win.id);});
  return w;
}
function startResize(e,win,dir){
  e.stopPropagation();
  // Update focus inline without rerender — renderAll() would destroy the resize
  // handle DOM, breaking setPointerCapture and the move/up handlers.
  const handle=e.currentTarget;
  const wEl=handle.closest('.win');
  if(state.activeWin !== win.id){
    const oldEl = document.querySelector(`.win[data-id="${state.activeWin}"]`);
    if(oldEl){const ot=oldEl.querySelector('.titlebar');if(ot)ot.classList.add('inactive');}
    state.activeWin = win.id;
    win.z = state.zTop + 1; state.zTop = win.z;
    win.minimized = false;
    if(wEl){wEl.style.zIndex = win.z; wEl.classList.remove('minimized');}
    const tb = wEl ? wEl.querySelector('.titlebar') : null;
    if(tb) tb.classList.remove('inactive');
    save();
  }
  const startX=e.clientX,startY=e.clientY;
  const ox=win.x,oy=win.y,ow=win.width,oh=win.height;
  const minW=(state.apps.find(a=>a.id===win.appId)||{}).mw||320,minH=(state.apps.find(a=>a.id===win.appId)||{}).mh||240;
  try{handle.setPointerCapture(e.pointerId);}catch(err){}
  const move=ev=>{
    const dx=ev.clientX-startX,dy=ev.clientY-startY;
    let x=ox,y=oy,w=ow,h=oh;
    if(dir.includes('e'))w=Math.max(minW,ow+dx);
    if(dir.includes('s'))h=Math.max(minH,oh+dy);
    if(dir.includes('w')){w=Math.max(minW,ow-dx);x=ox+(ow-w);}
    if(dir.includes('n')){h=Math.max(minH,oh-dy);y=oy+(oh-h);}
    win.x=x;win.y=y;win.width=w;win.height=h;
    const wEl=document.querySelector(`.win[data-id="${win.id}"]`);
    if(wEl){wEl.style.left=x+'px';wEl.style.top=y+'px';wEl.style.width=w+'px';wEl.style.height=h+'px';}
    resizeWindow(win.id,{x,y,width:w,height:h});
  };
  const up=ev=>{
    try{handle.releasePointerCapture(e.pointerId);}catch(err){}
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
}
function showSnapPreview(sp){
  state.snapPreview=sp;
  const ov=$('#snap-overlay');
  if(!sp){if(ov)ov.style.display='none';return;}
  if(!ov){document.body.appendChild(el('div',{id:'snap-overlay'}));}
  const o=$('#snap-overlay');o.style.display='block';
  const vw=window.innerWidth,vh=window.innerHeight,top=28,bottom=90;
  if(sp==='max'){o.style.left='8px';o.style.top=(top+4)+'px';o.style.width=(vw-16)+'px';o.style.height=(vh-top-bottom-12)+'px';}
  else if(sp==='left'){o.style.left='8px';o.style.top=(top+4)+'px';o.style.width=(vw/2-12)+'px';o.style.height=(vh-top-bottom-12)+'px';}
  else{o.style.left=(vw/2+4)+'px';o.style.top=(top+4)+'px';o.style.width=(vw/2-12)+'px';o.style.height=(vh-top-bottom-12)+'px';}
}
function renderSnapOverlay(){return el('div',{id:'snap-overlay',style:'display:none'});}

/* ---------- Rerender (preserve window DOM where possible) ---------- */
function rerender(){
  if(state.phase!=='desktop'){renderAll();return;}
  renderAll();
}

/* ---------- Notifications ---------- */
function notify(title,body){
  state.notifications.unshift({id:uid('n'),title,body,time:Date.now(),read:false});
  state.notifications=state.notifications.slice(0,50);
  save();
}

/* ---------- Apply brightness ---------- */
function applyBrightness(){
  const v=state.settings.brightness/100;
  document.getElementById('root').style.filter=`brightness(${v})`;
}

/* ---------- Command palette ---------- */
function togglePalette(open){
  state.paletteOpen=open!==undefined?open:!state.paletteOpen;
  if(state.paletteOpen){renderPalette();}
  else{const o=$('#palette-overlay');if(o)o.remove();}
}
function renderPalette(){
  const ov=el('div',{id:'palette-overlay'});
  const pal=el('div',{id:'palette'});
  const search=el('div',{class:'search'},[icon('search'),el('input',{placeholder:'搜索应用、文件或操作…'})]);
  const input=search.querySelector('input');
  const list=el('div',{class:'list'});
  pal.appendChild(search);pal.appendChild(list);ov.appendChild(pal);
  ov.addEventListener('pointerdown',e=>{if(e.target===ov)togglePalette(false);});
  document.body.appendChild(ov);
  let items=[];let active=0;
  function build(q){
    q=(q||'').toLowerCase();items=[];
    state.apps.filter(a=>!q||a.name.toLowerCase().includes(q)).forEach(a=>items.push({type:'app',label:a.name,hint:'应用',app:a,run:()=>openApp(a.id)}));
    state.files.filter(f=>!q||f.name.toLowerCase().includes(q)).slice(0,8).forEach(f=>items.push({type:'file',label:f.name,hint:f.type==='folder'?'文件夹':'文件',f:f,run:()=>{if(f.type==='folder')openApp('filemanager',{folderId:f.id});else openApp('texteditor',{fileId:f.id});}}));
    const acts=[
      {label:'打开设置',run:()=>openApp('settings')},
      {label:state.settings.theme==='dark'?'切换到浅色主题':'切换到深色主题',run:()=>{state.settings.theme=state.settings.theme==='dark'?'light':'dark';save();renderAll();}},
      {label:'锁屏',run:lock},{label:'重启',run:restart},{label:'关机',fn:shutdown},
    ];
    acts.filter(a=>!q||a.label.toLowerCase().includes(q)).forEach(a=>items.push({type:'act',label:a.label,hint:'操作',run:a.run}));
    items=items.slice(0,24);active=0;renderItems();
  }
  function renderItems(){
    list.innerHTML='';
    if(!items.length){list.appendChild(el('div',{style:'text-align:center;padding:40px;color:var(--muted);font-size:13px'},'未找到匹配项'));return;}
    items.forEach((it,i)=>{
      const pi=el('div',{class:'pitem'+(i===active?' active':'')});
      const pic=el('div',{class:'pic',style:it.type==='app'?`--g1:${it.app.g1};--g2:${it.app.g2}`:''});
      if(it.type==='app'){if(it.app.url){pic.textContent=(it.app.name[0]||'A').toUpperCase();pic.style.fontSize='12px';pic.style.fontWeight='600';}else{const ic=icon(it.app.icon);ic.style.width='14px';ic.style.height='14px';pic.appendChild(ic);}}
      else if(it.type==='file'){pic.style.background='var(--muted)';pic.appendChild(icon(it.f.type==='folder'?'folder':'filetext'));}
      else{pic.style.background='var(--muted)';pic.appendChild(icon('settings'));}
      pi.appendChild(pic);pi.appendChild(el('div',{class:'pl'},it.label));pi.appendChild(el('div',{class:'ph'},it.hint));
      pi.onmousemove=()=>{active=i;renderItems();};
      pi.onclick=()=>{togglePalette(false);it.run();};
      list.appendChild(pi);
    });
  }
  input.oninput=()=>build(input.value);
  input.onkeydown=e=>{
    if(e.key==='ArrowDown'){e.preventDefault();active=(active+1)%Math.max(1,items.length);renderItems();}
    else if(e.key==='ArrowUp'){e.preventDefault();active=(active-1+items.length)%Math.max(1,items.length);renderItems();}
    else if(e.key==='Enter'){e.preventDefault();if(items[active]){togglePalette(false);items[active].run();}}
    else if(e.key==='Escape')togglePalette(false);
  };
  setTimeout(()=>input.focus(),30);
  build('');
}

/* ---------- Global shortcuts ---------- */
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();togglePalette();return;}
  if(e.altKey&&e.key==='Tab'){e.preventDefault();cycleWindow(e.shiftKey?-1:1);return;}
  if(e.key==='Escape'){togglePalette(false);closeCtxMenu();closeDropdowns();}
});
function cycleWindow(dir){
  const vis=state.windows.filter(w=>!w.minimized).sort((a,b)=>b.z-a.z);
  if(!vis.length)return;
  const idx=vis.findIndex(w=>w.id===state.activeWin);
  const next=vis[(idx+dir+vis.length)%vis.length];
  if(next)focusWindow(next.id);
}

/* ---------- App body dispatcher ---------- */
function renderAppBody(win,app){
  const c=el('div',{style:'width:100%;height:100%'});
  switch(app.id){
    case 'filemanager':return renderFileManager(win);
    case 'browser':return renderBrowser(win);
    case 'appstore':return renderAppStore(win);
    case 'settings':return renderSettings(win);
    case 'texteditor':return renderTextEditor(win);
    case 'terminal':return renderTerminal(win);
    case 'calculator':return renderCalculator(win);
    case 'clock':return renderClock(win);
    case 'about':return renderAbout(win);
    default:
      if(app.url)return renderWebApp(win,app);
      return el('div',{style:'display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)'},'未知应用');
  }
}

/* ---------- File Manager ---------- */

    up.querySelector('input').onchange=e=>{const files=Array.from(e.target.files);files.forEach(f=>{const r=new FileReader();r.onload=()=>{state.files.push({id:uid('f'),name:f.name,type:'file',parentId:currentId,mimeType:f.type,dataUrl:f.type.startsWith('text/')?undefined:r.result,content:f.type.startsWith('text/')?r.result:undefined,createdAt:Date.now(),updatedAt:Date.now()});save();rerenderFM();};if(f.type.startsWith('text/'))r.readAsText(f);else r.readAsDataURL(f);});};

  const btns=toolbar.querySelectorAll('.icon-btn');
  if(btns[1])btns[1].onclick=()=>{const n=`新建文件夹`;let fn=n,i=1;while(state.files.some(f=>f.parentId===currentId&&f.name===fn))fn=`${n} ${i++}`;state.files.push({id:uid('f'),name:fn,type:'folder',parentId:currentId,createdAt:Date.now(),updatedAt:Date.now()});save();rerenderFM();notify('已创建',fn);};

function deleteFile(id){
  const toTrash=new Set([id]);let changed=true;
  while(changed){changed=false;state.files.forEach(f=>{if(f.parentId&&toTrash.has(f.parentId)&&!toTrash.has(f.id)){toTrash.add(f.id);changed=true;}});}
  const trashed=state.files.filter(f=>toTrash.has(f.id)).map(f=>({...f,_origParent:f.parentId}));
  state.files=state.files.filter(f=>!toTrash.has(f.id));
  state.trash=[...trashed,...state.trash];save();
}
function restoreFile(id){
  const toRestore=new Set([id]);let changed=true;
  while(changed){changed=false;state.trash.forEach(f=>{if(f._origParent&&toRestore.has(f._origParent)&&!toRestore.has(f.id)){toRestore.add(f.id);changed=true;}});}
  const restored=state.trash.filter(f=>toRestore.has(f.id)).map(f=>{const {_origParent,...r}=f;return {...r,parentId:_origParent??null};});
  state.trash=state.trash.filter(f=>!toRestore.has(f.id));
  state.files=[...state.files,...restored];save();
}

/* ---------- Terminal ---------- */
function renderTerminal(win){
  let cwd=null;const history=[];let hi=-1;
  const t=el('div',{class:'term'});
  const out=el('div',{class:'out'});
  const inputLine=el('div',{class:'input-line'});
  const ps=el('div',{class:'ps'});
  const inp=el('input',{autofocus:true,spellcheck:'false'});
  inputLine.appendChild(ps);inputLine.appendChild(inp);
  t.appendChild(out);t.appendChild(inputLine);
  function prompt(){return 'user@webos:'+(cwd?'/'+(state.files.find(f=>f.id===cwd)?.name||''):'~')+'$ ';}
  function setPrompt(){ps.textContent=prompt();}
  function print(text){out.appendChild(el('div',{class:'line'},text));out.scrollTop=out.scrollHeight;}
  print('WebOS Terminal v1.0  — 输入 help 查看命令');
  setPrompt();
  function pathResolve(arg){
    if(!arg||arg==='~'||arg==='/')return null;
    if(arg==='..'){return cwd?state.files.find(f=>f.id===cwd)?.parentId||null:null;}
    return state.files.find(f=>f.name===arg&&f.parentId===cwd&&(f.type==='folder'))?.id||null;
  }
  function run(cmd){
    const parts=cmd.trim().split(/\s+/);const c=parts[0];const args=parts.slice(1);
    print(prompt()+cmd);
    switch(c){
      case'':break;
      case'help':print('可用命令: ls cd pwd cat echo mkdir touch rm write clear date whoami history neofetch open apps theme exit');break;
      case'ls':state.files.filter(f=>f.parentId===cwd).forEach(f=>print((f.type==='folder'?'📁 ':'📄 ')+f.name));break;
      case'cd':{const id=pathResolve(args[0]);if(args[0]&&(id!==null||args[0]==='..'||args[0]==='/'||args[0]==='~')){cwd=id;}else if(args[0]){print('cd: 无此目录: '+args[0]);}break;}
      case'pwd':{const p=[];let id=cwd;while(id){const f=state.files.find(x=>x.id===id);if(!f)break;p.unshift(f.name);id=f.parentId;}print('/'+p.join('/'));break;}
      case'cat':{const f=state.files.find(x=>x.name===args[0]&&x.parentId===cwd);if(f)print(f.content||'(空)');else print('cat: '+args[0]+': 无此文件');break;}
      case'echo':print(args.join(' '));break;
      case'mkdir':if(args[0]){state.files.push({id:uid('f'),name:args[0],type:'folder',parentId:cwd,createdAt:Date.now(),updatedAt:Date.now()});save();print('已创建 '+args[0]);}break;
      case'touch':if(args[0]){state.files.push({id:uid('f'),name:args[0],type:'file',parentId:cwd,mimeType:'text/plain',content:'',createdAt:Date.now(),updatedAt:Date.now()});save();print('已创建 '+args[0]);}break;
      case'rm':if(args[0]){const f=state.files.find(x=>x.name===args[0]&&x.parentId===cwd);if(f){deleteFile(f.id);print('已删除 '+args[0]);}else print('rm: '+args[0]+': 无此文件');}break;
      case'write':{if(args[0]){const txt=args.slice(1).join(' ');let f=state.files.find(x=>x.name===args[0]&&x.parentId===cwd);if(f){f.content=txt;}else{f={id:uid('f'),name:args[0],type:'file',parentId:cwd,mimeType:'text/plain',content:txt,createdAt:Date.now(),updatedAt:Date.now()};state.files.push(f);}save();print('已写入 '+args[0]);}break;}
      case'clear':out.innerHTML='';break;
      case'date':print(new Date().toString());break;
      case'whoami':print(state.settings.username);break;
      case'history':history.forEach((h,i)=>print((i+1)+'  '+h));break;
      case'neofetch':print('       _____   user@webos\n      / ___ \\  -----------\n     | |___| | OS: WebOS 1.0\n     | _____ | Shell: zsh-mock\n      \\_____/  CPU: Virtual Core\n               Memory: localStorage');break;
      case'open':{const app=state.apps.find(a=>a.name.toLowerCase()===(args[0]||'').toLowerCase()||a.id===args[0]);if(app){openApp(app.id);print('打开 '+app.name);}else print('open: 未找到应用: '+args[0]);break;}
      case'apps':state.apps.forEach(a=>print(a.name));break;
      case'theme':if(args[0]==='light'||args[0]==='dark'){state.settings.theme=args[0];save();renderAll();print('主题: '+args[0]);}else print('用法: theme <light|dark>');break;
      case'exit':closeWindow(win.id);return;
      default:print(c+': command not found');
    }
    setPrompt();
  }
  inp.onkeydown=e=>{
    if(e.key==='Enter'){const cmd=inp.value;history.push(cmd);hi=history.length;inp.value='';run(cmd);}
    else if(e.key==='ArrowUp'){e.preventDefault();if(hi>0){hi--;inp.value=history[hi]||'';}}
    else if(e.key==='ArrowDown'){e.preventDefault();if(hi<history.length-1){hi++;inp.value=history[hi]||'';}else{hi=history.length;inp.value='';}}
  };
  t.onclick=()=>inp.focus();
  setTimeout(()=>inp.focus(),50);
  return t;
}

/* ---------- Calculator ---------- */
function renderCalculator(win){
  let expr='';let result='0';
  const c=el('div',{class:'calc'});
  const display=el('div',{class:'display'});
  const exprEl=el('div',{class:'expr'});
  const resEl=el('div',{class:'result'},'0');
  display.appendChild(exprEl);display.appendChild(resEl);
  c.appendChild(display);
  const grid=el('div',{class:'grid'});
  const keys=[
    {l:'C',cls:'fn',a:()=>{expr='';result='0';render();}},
    {l:'⌫',cls:'fn',a:()=>{expr=expr.slice(0,-1);render();}},
    {l:'%',cls:'fn',a:()=>{expr+='%';render();}},
    {l:'÷',cls:'op',a:()=>{expr+='/';render();}},
    {l:'7'},{l:'8'},{l:'9'},
    {l:'×',cls:'op',a:()=>{expr+='*';render();}},
    {l:'4'},{l:'5'},{l:'6'},
    {l:'−',cls:'op',a:()=>{expr+='-';render();}},
    {l:'1'},{l:'2'},{l:'3'},
    {l:'+',cls:'op',a:()=>{expr+='+';render();}},
    {l:'±',a:()=>{expr='('+expr+')*-1';render();}},
    {l:'0'},{l:'.'},
    {l:'=',cls:'eq',a:calc},
  ];
  function calc(){
    try{const e=expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-').replace(/%/g,'/100');
      // sanitize
      if(!/^[-+*/().\d\s]+$/.test(e)){result='Error';render();return;}
      const r=Function('"use strict";return ('+e+')')();
      result=String(r);expr=result;render();
    }catch(err){result='Error';render();}
  }
  function render(){exprEl.textContent=expr||'';resEl.textContent=result;}
  keys.forEach(k=>{
    const b=el('button',{class:k.cls||''},k.l);
    b.onclick=()=>{if(k.a)k.a();else{expr+=k.l;render();}};
    grid.appendChild(b);
  });
  c.appendChild(grid);
  // keyboard
  const onKey=e=>{
    if(!document.body.contains(c))return;
    if(/^[0-9]$/.test(e.key))expr+=e.key;
    else if(e.key==='+')expr+='+';
    else if(e.key==='-')expr+='-';
    else if(e.key==='*')expr+='*';

    else if(e.key==='.')expr+='.';
    else if(e.key==='Enter'||e.key==='='){e.preventDefault();calc();return;}
    else if(e.key==='Backspace'){expr=expr.slice(0,-1);}
    else if(e.key==='Escape'){expr='';result='0';}

    render();
  };
  document.addEventListener('keydown',onKey);

  const obs=new MutationObserver(()=>{if(!document.body.contains(c)){document.removeEventListener('keydown',onKey);obs.disconnect();}});

  render();
  return c;
}

      const btns=el('div',{style:'display:flex;gap:8px;justify-content:center'});

      const inp=el('div',{style:'display:flex;gap:8px;justify-content:center;align-items:center'},[el('input',{type:'number',value:'0',min:'0',style:'width:60px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--fg);text-align:center'}),el('span',{},'分'),el('input',{type:'number',value:'30',min:'0',max:'59',style:'width:60px;padding:8px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--fg);text-align:center'}),el('span',{},'秒')]);
